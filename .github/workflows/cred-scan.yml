name: Credential Scanner

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  cred-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
    - name: Scan credentials
      uses: outscale-dev/cred-scan@36ef82cc690d72a17bf0993ab323961f1b1f9c66 # main
      with:
        scan_path: "./"
